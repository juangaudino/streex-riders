<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0B0B0B" />
    <title>STREEX Passenger Console</title>
    <style>
      :root { color-scheme: dark; font-family: Montserrat, Arial, sans-serif; }
      body { align-items: center; background: #0b0b0b; color: #fff; display: flex; justify-content: center; margin: 0; min-height: 100dvh; padding: 24px; text-align: center; }
      main { max-width: 320px; }
      img { border-radius: 28px; height: 88px; width: 88px; }
      p { color: rgba(255,255,255,.62); line-height: 1.55; }
      button { background: #e6ce20; border: 0; border-radius: 999px; color: #0b0b0b; font: inherit; font-weight: 700; margin-top: 12px; padding: 14px 22px; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/streex-app-icon-192.png" alt="STREEX" />
      <h1>You’re offline</h1>
      <p>Reconnect to continue your STREEX experience.<br />Vuelve a conectarte para continuar tu experiencia STREEX.</p>
      <button type="button" onclick="window.location.reload()">Try again / Intentar de nuevo</button>
    </main>
  </body>
</html>
